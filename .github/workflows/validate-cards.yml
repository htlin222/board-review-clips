name: Validate cards

# Lightweight PR gate: when a PR touches card JSONs, run the format check and
# unit tests (no TTS, no rendering) so malformed cards are blocked before
# merge — the full build/release runs post-merge in release-cards.yml.

on:
  pull_request:
    paths:
      - "cards/*.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate card format
        run: pnpm validate

      - name: Run tests
        run: pnpm test
